<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <title>Jarvis Active</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --ink: #fff7ea;
      --muted: rgba(255, 238, 211, .62);
      --dim: rgba(255, 238, 211, .34);
      --gold: #ffb83d;
      --amber: #ff6a21;
      --cyan: #2de6ff;
      --gold-rgb: 255, 184, 61;
      --amber-rgb: 255, 106, 33;
      --red: #ff315f;
      --panel: rgba(5, 5, 5, .58);
      --line: rgba(255, 184, 61, .24);
      --glow: rgba(255, 130, 32, .42);
    }
    body.blue { --gold:#2de6ff; --amber:#246bff; --cyan:#7cf7ff; --gold-rgb:45,230,255; --amber-rgb:36,107,255; --line:rgba(45,230,255,.28); --glow:rgba(45,230,255,.38); }
    body.green { --gold:#64ff9a; --amber:#16c96f; --cyan:#caff4a; --gold-rgb:100,255,154; --amber-rgb:22,201,111; --line:rgba(100,255,154,.28); --glow:rgba(100,255,154,.34); }
    body.listening { --gold:#ff315f; --amber:#ff6a21; --cyan:#ffb83d; --gold-rgb:255,49,95; --amber-rgb:255,106,33; --line:rgba(255,49,95,.32); --glow:rgba(255,49,95,.46); }
    body.speaking { --gold:#ff4f7c; --amber:#ff7a9b; --cyan:#ffb83d; --gold-rgb:255,79,124; --amber-rgb:255,122,155; --line:rgba(255,79,124,.32); --glow:rgba(255,79,124,.42); }

    * { box-sizing: border-box; }
    html, body { min-width: 320px; min-height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      overflow: hidden;
      background: #050505;
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

    .scene {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 184, 61, .2), transparent 29%),
        radial-gradient(circle at 50% 70%, rgba(45, 230, 255, .08), transparent 26%),
        linear-gradient(180deg, #050505 0%, #070707 52%, #020202 100%);
    }
    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, transparent 1px 5px),
        radial-gradient(circle at 50% 50%, transparent 0 48%, rgba(0,0,0,.72) 82%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: .36;
    }
    .scene::after {
      content: "";
      position: absolute;
      inset: -50%;
      background:
        linear-gradient(rgba(var(--gold-rgb),.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--gold-rgb),.055) 1px, transparent 1px);
      background-size: 58px 58px;
      transform: perspective(1000px) rotateX(64deg) translateY(25%);
      transform-origin: center;
      animation: grid 14s linear infinite;
      opacity: .42;
    }
    #network, #core {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    #core { z-index: 2; }

    .app {
      position: relative;
      z-index: 3;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: clamp(14px, 2vw, 28px);
    }
    .top {
      display: grid;
      grid-template-columns: 1fr;
      justify-items: center;
      align-items: start;
      gap: 16px;
      pointer-events: none;
    }
    .brand, .time, .status-stack, .glass {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255,255,255,.055), rgba(5,5,5,.28));
      box-shadow: 0 0 32px rgba(0,0,0,.4), inset 0 0 26px rgba(var(--gold-rgb),.035);
      backdrop-filter: blur(18px);
    }
    .brand {
      width: min(420px, 46vw);
      padding: 14px 16px;
      border-radius: 16px;
    }
    .brand small, .time small, .status small {
      display: block;
      color: var(--dim);
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .brand h1 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(18px, 2.2vw, 30px);
      letter-spacing: .2em;
      text-transform: uppercase;
      font-weight: 900;
      text-shadow: 0 0 28px var(--glow);
    }
    .time {
      min-width: 220px;
      padding: 12px 18px;
      border-radius: 999px;
      text-align: center;
    }
    .time b {
      display: block;
      color: var(--ink);
      font-size: clamp(22px, 3vw, 36px);
      line-height: 1;
      letter-spacing: .12em;
    }
    .status-stack {
      justify-self: end;
      width: min(360px, 40vw);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .status { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--muted); }
    .status b { color: var(--gold); letter-spacing: .12em; text-transform: uppercase; }

    .center {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 0;
      pointer-events: none;
    }
    .hub-reticle {
      position: absolute;
      left: 50%;
      top: 48%;
      width: min(720px, 72vw);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      pointer-events: none;
      opacity: .72;
    }
    .hub-reticle::before,
    .hub-reticle::after {
      content: "";
      position: absolute;
      inset: var(--inset, 0);
      border-radius: inherit;
      border: 1px solid rgba(var(--gold-rgb),.16);
      box-shadow: inset 0 0 28px rgba(var(--gold-rgb),.035), 0 0 28px rgba(var(--amber-rgb),.06);
    }
    .hub-reticle::after {
      --inset: 16%;
      border-style: dashed;
      animation: reticleSpin 24s linear infinite;
    }
    .reticle-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(var(--gold-rgb),.18), transparent);
      transform-origin: center;
    }
    .reticle-line:nth-child(1) { transform: translate(-50%, -50%); }
    .reticle-line:nth-child(2) { transform: translate(-50%, -50%) rotate(90deg); }
    .reticle-line:nth-child(3) { transform: translate(-50%, -50%) rotate(35deg); opacity: .55; }
    .reticle-line:nth-child(4) { transform: translate(-50%, -50%) rotate(-35deg); opacity: .55; }
    .prompt {
      position: relative;
      width: 100%;
      border: 1px solid rgba(var(--gold-rgb),.28);
      border-radius: 999px;
      background: rgba(5,5,5,.54);
      box-shadow: 0 0 34px var(--glow);
      backdrop-filter: blur(18px);
      padding: 8px;
      display: grid;
      grid-template-columns: 54px 1fr 54px;
      gap: 8px;
      pointer-events: auto;
    }
    .prompt input {
      min-width: 0;
      height: 54px;
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      padding: 0 8px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 14px;
    }
    .prompt input::placeholder { color: var(--dim); }
    .orb-btn {
      width: 54px;
      height: 54px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(var(--gold-rgb),.16), rgba(5,5,5,.55));
      color: var(--gold);
      display: grid;
      place-items: center;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .orb-btn:hover, .orb-btn:focus-visible {
      outline: none;
      transform: scale(1.05);
      border-color: var(--gold);
      box-shadow: 0 0 28px var(--glow);
    }
    .orb-btn.hot { background: linear-gradient(135deg, var(--gold), var(--amber)); color: #130700; border-color: transparent; }
    .orb-btn svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .chat-dock {
      position: absolute;
      left: 50%;
      bottom: 4.2%;
      transform: translateX(-50%);
      width: min(760px, 56vw);
      min-width: 420px;
      border: 1px solid rgba(var(--gold-rgb),.18);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 0, rgba(var(--gold-rgb),.12), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,.052), rgba(0,0,0,.48));
      box-shadow: 0 20px 54px rgba(0,0,0,.48), inset 0 0 34px rgba(var(--gold-rgb),.035);
      backdrop-filter: blur(18px);
      padding: 12px;
      display: grid;
      gap: 10px;
      pointer-events: auto;
    }
    .chat-caption {
      min-height: 18px;
      text-align: center;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      text-shadow: 0 0 24px var(--glow);
    }
    .side-panel {
      position: fixed;
      z-index: 6;
      top: 112px;
      bottom: 24px;
      width: min(330px, 28vw);
      border: 1px solid var(--line);
      border-radius: 20px;
      background:
        radial-gradient(circle at 80% 12%, rgba(var(--gold-rgb),.12), transparent 30%),
        linear-gradient(135deg, rgba(255,255,255,.055), rgba(5,5,5,.5));
      box-shadow: 0 18px 44px rgba(0,0,0,.44), inset 0 0 26px rgba(var(--gold-rgb),.035);
      backdrop-filter: blur(18px);
      pointer-events: auto;
      display: grid;
      grid-template-rows: auto 1fr;
      transition: transform .28s ease, opacity .22s ease;
    }
    .side-panel.left { left: 24px; width: 76px; border-radius: 18px; }
    .side-panel.right { right: 24px; width: min(360px, 28vw); }
    body.left-closed .side-panel.left { transform: translateX(calc(-100% - 34px)); opacity: .18; }
    body.right-closed .side-panel.right { transform: translateX(calc(100% + 34px)); opacity: .18; }
    .side-head {
      min-height: 58px;
      padding: 14px;
      border-bottom: 1px solid rgba(var(--gold-rgb),.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .side-head b {
      color: var(--gold);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .side-head small {
      display: block;
      margin-top: 3px;
      color: var(--dim);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .side-body {
      min-height: 0;
      padding: 14px;
      display: grid;
      gap: 12px;
      overflow: auto;
      scrollbar-color: var(--gold) transparent;
    }
    .side-toggle {
      position: fixed;
      z-index: 8;
      top: 50%;
      width: 42px;
      height: 88px;
      border: 1px solid var(--line);
      background: rgba(5,5,5,.72);
      color: var(--gold);
      box-shadow: 0 0 22px rgba(var(--amber-rgb),.16);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      transition: .2s ease;
    }
    .side-toggle.left-toggle { left: 0; border-radius: 0 14px 14px 0; }
    .side-toggle.right-toggle { right: 0; border-radius: 14px 0 0 14px; }
    .side-toggle:hover, .side-toggle:focus-visible { outline: none; box-shadow: 0 0 28px var(--glow); }
    .side-toggle svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    body.left-closed .left-toggle svg { transform: rotate(180deg); }
    body.right-closed .right-toggle svg { transform: rotate(180deg); }
    .chat {
      min-height: 0;
      overflow: auto;
      border-radius: 14px;
      padding: 0;
      scrollbar-color: var(--gold) transparent;
    }
    .side-panel.right .chat {
      padding: 2px;
    }
    .messages { display: flex; gap: 10px; flex-direction: column; }
    .msg {
      width: fit-content;
      max-width: min(760px, 88vw);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      background: rgba(5,5,5,.5);
      padding: 10px 12px;
      color: rgba(255,247,234,.94);
      line-height: 1.55;
      font-size: 14px;
    }
    .msg b {
      display: block;
      margin-bottom: 5px;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .msg.user {
      align-self: flex-end;
      border-color: var(--line);
      background: linear-gradient(135deg, rgba(var(--gold-rgb),.12), rgba(5,5,5,.58));
    }
    .controls {
      display: grid;
      gap: 8px;
    }
    .settings-tray {
      position: fixed;
      z-index: 9;
      left: 112px;
      bottom: 24px;
      width: min(300px, calc(100vw - 136px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        radial-gradient(circle at 18% 0, rgba(var(--gold-rgb),.18), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(5,5,5,.7));
      box-shadow: 0 20px 48px rgba(0,0,0,.5), inset 0 0 26px rgba(var(--gold-rgb),.035);
      backdrop-filter: blur(18px);
      padding: 12px;
      pointer-events: auto;
      transform: translateY(12px);
      opacity: 0;
      visibility: hidden;
      transition: transform .22s ease, opacity .18s ease, visibility .18s ease;
    }
    body.settings-open .settings-tray {
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
    }
    .settings-title {
      color: var(--gold);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .mini {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(5,5,5,.54);
      color: var(--gold);
      padding: 0 14px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      transition: .18s ease;
    }
    .mini:hover, .mini:focus-visible { outline: none; border-color: var(--gold); box-shadow: 0 0 22px var(--glow); }
    .quick-row { display: grid; gap: 10px; }
    .side-panel.left .side-head {
      justify-content: center;
      min-height: 50px;
      padding: 10px;
    }
    .side-panel.left .side-head b {
      font-size: 10px;
      letter-spacing: .12em;
    }
    .side-panel.left .side-head small,
    .side-panel.left .system-card {
      display: none;
    }
    .side-panel.left .side-body {
      padding: 10px;
      align-content: start;
      overflow: hidden;
    }
    .side-panel.left .quick-row { gap: 10px; }
    .side-panel.left .chip {
      width: 54px;
      min-height: 54px;
      border-radius: 14px;
      padding: 0;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .side-panel.left .chip b {
      margin: 0;
      font-size: 11px;
      letter-spacing: .08em;
    }
    .side-panel.left .chip svg {
      width: 21px;
      height: 21px;
      stroke: var(--gold);
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 10px var(--glow));
    }
    .side-panel.left .chip b {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }
    .side-panel.left .chip span,
    .side-panel.left .chip::after {
      display: none;
    }
    .chip {
      width: 100%;
      min-height: 84px;
      border: 1px solid rgba(var(--gold-rgb),.24);
      border-radius: 16px;
      background:
        radial-gradient(circle at 80% 18%, rgba(var(--gold-rgb),.18), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(5,5,5,.48));
      color: var(--muted);
      padding: 12px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: auto;
      text-align: left;
      box-shadow: 0 14px 34px rgba(0,0,0,.38), inset 0 0 20px rgba(var(--gold-rgb),.03);
      backdrop-filter: blur(12px);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .chip b { display: block; color: var(--gold); font-size: 13px; letter-spacing: .14em; margin-bottom: 7px; }
    .chip span { display: block; color: var(--dim); letter-spacing: .04em; text-transform: none; line-height: 1.35; }
    .chip::after {
      content: "";
      display: block;
      height: 3px;
      margin-top: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: .58;
    }
    .chip:hover, .chip:focus-visible { outline: none; color: var(--gold); border-color: var(--gold); box-shadow: 0 0 34px var(--glow); }
    .chip:nth-child(n) { position: relative; left: auto; right: auto; top: auto; bottom: auto; transform: none; }
    .system-card {
      border: 1px solid rgba(var(--gold-rgb),.14);
      border-radius: 14px;
      padding: 12px;
      background: rgba(5,5,5,.42);
      color: var(--muted);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
    }
    .system-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(var(--gold-rgb),.08);
    }
    .system-row:last-child { border-bottom: 0; }
    .system-row b { color: var(--gold); font-weight: 600; }

    .boot {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: #050505;
      transition: opacity .4s ease, visibility .4s ease;
    }
    .boot.hide { opacity: 0; visibility: hidden; }
    .boot-card {
      width: min(560px, 88vw);
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(5,5,5,.72);
      padding: 30px;
      box-shadow: 0 0 48px var(--glow);
    }
    .boot-card h2 { margin: 0; color: var(--gold); font-size: 34px; letter-spacing: .2em; text-transform: uppercase; }
    .boot-card p { margin: 16px 0 0; color: var(--muted); line-height: 1.9; }
    .bar { height: 4px; border-radius: 999px; background: rgba(255,255,255,.08); margin-top: 22px; overflow: hidden; }
    .bar span { display: block; width: 100%; height: 100%; background: linear-gradient(90deg, var(--gold), var(--amber), var(--cyan)); transform-origin: left; animation: load 1.8s ease-out both; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 220px;
      z-index: 12;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(5,5,5,.8);
      color: var(--gold);
      padding: 10px 16px;
      pointer-events: none;
      transition: .2s ease;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-size: 12px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes grid { to { background-position: 0 58px, 58px 0; } }
    @keyframes load { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes reticleSpin { to { transform: rotate(360deg); } }

    @media (max-width: 860px) {
      body { overflow: auto; }
      .app { min-height: 100dvh; gap: 12px; }
      .top { grid-template-columns: 1fr; }
      .time { display: none; }
      .chat-dock { width: min(92vw, 720px); min-width: 0; bottom: 18px; }
      .side-panel { top: 92px; bottom: 16px; width: min(340px, 82vw); }
      .side-panel.left { left: 12px; width: 76px; }
      .side-panel.right { right: 12px; }
      .settings-tray { left: 100px; bottom: 16px; }
      .controls { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 560px) {
      .prompt { grid-template-columns: 50px 1fr 50px; }
      .orb-btn { width: 50px; height: 50px; }
      .hub-reticle { width: 82vw; top: 47%; }
      .side-panel { width: min(330px, calc(100vw - 48px)); }
      .side-panel.left { width: 76px; }
      .chip { min-height: 68px; padding: 10px; }
      .chat-dock { bottom: 14px; padding: 10px; }
      .controls { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true"></div>
  <canvas id="network" aria-hidden="true"></canvas>
  <canvas id="core" aria-hidden="true"></canvas>

  <div class="boot" id="boot">
    <div class="boot-card mono">
      <h2>System Active</h2>
      <p>> voice link warming up<br>> command core online<br>> local interface secured</p>
      <div class="bar"><span></span></div>
    </div>
  </div>

  <main class="app">
    <header class="top">
      <section class="time">
        <small class="mono" id="dateLine">--</small>
        <b class="mono" id="clock">--:--:--</b>
      </section>
    </header>

    <section class="center">
      <div class="hub-reticle" aria-hidden="true">

  <div class="toast mono" id="toast"></div>

  <script>
    const STORE = "jarvis-active-reference:v1";
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const themes = ["", "blue", "green"];
    function readStore(key) {
      try { return localStorage.getItem(key); } catch { return null; }
    }
    function writeStore(key, value) {
      try { localStorage.setItem(key, value); } catch {}
    }
    let themeIndex = Number(readStore("jarvis-palette") || 0);
    let toastTimer = null;
    let recognition = null;
    const defaults = {
      messages: [
        { role: "jarvis", text: "System active. I can chat, listen by voice, speak back, and prepare safe PC/phone automation plans." }
      ]
    };
    let data = load();

    window.addEventListener("error", event => {
      const boot = document.getElementById("boot");
      if (boot) boot.classList.add("hide");
      console.error("Jarvis interface error:", event.message);
    });
    function cloneDefaults() {
      return JSON.parse(JSON.stringify(defaults));
    }
    function load() {
      try { return { ...cloneDefaults(), ...JSON.parse(readStore(STORE) || "{}") }; }
      catch { return cloneDefaults(); }
    }
    function save() {
      writeStore(STORE, JSON.stringify(data));
    }
    function esc(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[ch]));
    }
    function setMode(mode, caption, word) {
      document.body.classList.toggle("listening", mode === "listening");
      document.body.classList.toggle("speaking", mode === "speaking");
      const captionEl = document.getElementById("caption");
      if (captionEl) captionEl.textContent = caption;
    }
    function renderMessages() {
      const box = document.getElementById("messages");
      box.innerHTML = data.messages.map(m => `<div class="msg ${m.role === "you" ? "user" : ""}"><b>${m.role === "you" ? "You" : "Jarvis"}</b>${esc(m.text)}</div>`).join("");
      const chat = document.querySelector(".chat");
      if (chat) chat.scrollTop = chat.scrollHeight;
    }
    function addMessage(role, text) {
      data.messages.push({ role, text });
      data.messages = data.messages.slice(-60);
      save();
      renderMessages();
    }
    function answerFor(input) {
      const q = input.toLowerCase();
      if (q.includes("weather")) return "Weather briefing module is visual-only for now. Next step: connect a safe weather API through a small backend or static public endpoint.";
      if (q.includes("pc") || q.includes("computer") || q.includes("may tinh")) return "PC control must use a local agent with allowlisted commands, confirmation prompts, and no public secrets in this page.";
      if (q.includes("phone") || q.includes("dien thoai")) return "Phone control should start with shortcuts and notifications, then a secure bridge. The web UI should request actions, not store credentials.";
      if (q.includes("detective") || q.includes("trinh") || q.includes("case")) return "Detective mode: collect facts, build a timeline, mark contradictions, then ask one verification question.";
      if (q.includes("api") || q.includes("key") || q.includes("bao mat")) return "Security rule: never put a real AI API key into GitHub Pages. Use a backend proxy or serverless function.";
      return "Understood. I would turn that into a clean command: objective, context, constraints, evidence, then next action.";
    }
    function speak(text) {
      if (!("speechSynthesis" in window)) {
        setMode("online", "Speech output unavailable in this browser.", "ACTIVE");
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = .94;
      utter.pitch = .76;
      utter.onstart = () => setMode("speaking", "Jarvis is speaking.", "SPEAKING");
      utter.onend = () => setMode("online", "Awaiting command.", "ACTIVE");
      utter.onerror = () => setMode("online", "Speech output was blocked.", "ACTIVE");
      window.speechSynthesis.speak(utter);
    }
    function send(text) {
      const clean = text.trim();
      if (!clean) return;
      addMessage("you", clean);
      setMode("listening", "Processing command.", "LISTENING");
      setTimeout(() => {
        const reply = answerFor(clean);
        addMessage("jarvis", reply);
        speak(reply);
      }, 420);
    }
    function listen() {
      if (!SpeechRecognition) {
        toast("Voice unsupported");
        setMode("online", "Voice recognition unavailable here.", "ACTIVE");
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = "vi-VN";
      recognition.interimResults = false;
      recognition.onstart = () => setMode("listening", "Microphone channel open.", "LISTENING");
      recognition.onerror = () => setMode("online", "Voice channel interrupted.", "ACTIVE");
      recognition.onend = () => {
        if (!document.body.classList.contains("speaking")) setMode("online", "Awaiting command.", "ACTIVE");
      };
      recognition.onresult = event => {
        const text = event.results[0][0].transcript;
        document.getElementById("chatInput").value = text;
        send(text);
      };
      recognition.start();
    }
    async function copy(text, msg) {
      try { await navigator.clipboard.writeText(text); toast(msg); }
      catch { toast("Clipboard blocked"); }
    }
    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }
    function applyTheme() {
      document.body.classList.remove("blue", "green");
      if (themes[themeIndex]) document.body.classList.add(themes[themeIndex]);
      writeStore("jarvis-palette", String(themeIndex));
    }
    function tick() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString([], { hour12: false });
      document.getElementById("dateLine").textContent = now.toLocaleDateString([], { weekday: "long", month: "short", day: "2-digit" });
    }

    document.getElementById("composer").addEventListener("submit", event => {
      event.preventDefault();
      const input = document.getElementById("chatInput");
      send(input.value);
      input.value = "";
    });
    document.getElementById("voiceBtn").addEventListener("click", listen);
    document.getElementById("paletteBtn").addEventListener("click", () => {
      themeIndex = (themeIndex + 1) % themes.length;
      applyTheme();
      toast("Palette changed");
    });
    document.getElementById("copyBtn").addEventListener("click", () => {
      copy(data.messages.map(m => `${m.role === "you" ? "You" : "Jarvis"}: ${m.text}`).join("\n"), "Copied");
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      data.messages = cloneDefaults().messages;
      save();
      renderMessages();
      setMode("online", "Conversation reset.");
    });
    document.getElementById("leftToggle").addEventListener("click", () => {
      document.body.classList.toggle("left-closed");
    });
    document.getElementById("rightToggle").addEventListener("click", () => {
      document.body.classList.toggle("right-closed");
    });
    document.getElementById("settingsToggle").addEventListener("click", () => {
      document.body.classList.toggle("settings-open");
    });
    document.querySelectorAll(".chip[data-command]").forEach(chip => {
      chip.addEventListener("click", () => {
        const input = document.getElementById("chatInput");
        input.value = chip.dataset.command || "";
        input.focus();
      });
    });

    const networkCanvas = document.getElementById("network");
    const networkCtx = networkCanvas && networkCanvas.getContext ? networkCanvas.getContext("2d") : null;
    const coreCanvas = document.getElementById("core");
    const coreCtx = coreCanvas && coreCanvas.getContext ? coreCanvas.getContext("2d") : null;
    let points = [];
    let outerDust = [];
    let orbitDots = [];
    let meshNodes = [];
    let radialBeams = [];
    let orbitRings = [];
    let vortexArcs = [];
    let shellBands = [];
    let shardLines = [];
    function resize() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      [networkCanvas, coreCanvas].forEach(canvas => {
        if (!canvas) return;
        canvas.width = Math.floor(innerWidth * dpr);
        canvas.height = Math.floor(innerHeight * dpr);
        canvas.style.width = innerWidth + "px";
        canvas.style.height = innerHeight + "px";
      });
      if (networkCtx) networkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (coreCtx) coreCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      points = Array.from({ length: Math.min(80, Math.floor(innerWidth / 18)) }, () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        vx: (Math.random() - .5) * .28,
        vy: (Math.random() - .5) * .28
      }));
      const base = Math.min(innerWidth, innerHeight);
      const radius = Math.max(170, Math.min(390, base * .36));
      const density = innerWidth < 720 ? .58 : innerWidth < 1100 ? .86 : 1.18;
      outerDust = Array.from({ length: Math.floor(1800 * density) }, (_, i) => ({
        r: radius * (.72 + Math.random() * .36),
        a: Math.random() * Math.PI * 2,
        s: (.001 + Math.random() * .0034) * (i % 2 ? 1 : -1),
        tilt: .34 + Math.random() * .58,
        rot: Math.random() * Math.PI,
        size: .35 + Math.random() * 1.6,
        phase: Math.random() * Math.PI * 2,
        lane: Math.floor(Math.random() * 9),
        spark: Math.random() > .94
      }));
      orbitDots = Array.from({ length: Math.floor(1150 * density) }, (_, i) => ({
        r: radius * (.18 + Math.random() * .72),
        a: Math.random() * Math.PI * 2,
        s: (.0016 + Math.random() * .0062) * (i % 2 ? 1 : -1),
        tilt: .16 + Math.random() * .8,
        rot: Math.random() * Math.PI,
        size: .38 + Math.random() * 1.65,
        phase: Math.random() * Math.PI * 2
      }));
      meshNodes = Array.from({ length: Math.floor(76 * density) }, (_, i) => ({
        r: radius * (.12 + Math.random() * .52),
        a: Math.random() * Math.PI * 2,
        s: (.001 + Math.random() * .003) * (i % 2 ? 1 : -1),
        tilt: .28 + Math.random() * .54,
        rot: Math.random() * Math.PI,
        size: 1.15 + Math.random() * 2.4
      }));
      radialBeams = Array.from({ length: 34 }, (_, i) => ({
        a: (Math.PI * 2 / 34) * i + (Math.random() - .5) * .42,
        len: radius * (.72 + Math.random() * .72),
        inner: radius * (.04 + Math.random() * .18),
        width: .45 + Math.random() * 2.2,
        phase: Math.random() * Math.PI * 2,
        spin: (.0009 + Math.random() * .0022) * (i % 2 ? 1 : -1),
        tilt: .25 + Math.random() * .65,
        rot: Math.random() * Math.PI
      }));
      orbitRings = Array.from({ length: 34 }, (_, i) => ({
        r: radius * (.16 + i * .024),
        tilt: .13 + (i % 9) * .085,
        rot: (Math.PI / 34) * i,
        alpha: .07 + (i % 5) * .03,
        spin: (.001 + (i % 7) * .00042) * (i % 2 ? 1 : -1),
        width: .45 + (i % 4) * .16
      }));
      vortexArcs = Array.from({ length: 30 }, (_, i) => ({
        r: radius * (.12 + Math.random() * .42),
        tilt: .18 + Math.random() * .52,
        rot: Math.random() * Math.PI,
        start: Math.random() * Math.PI * 2,
        len: .35 + Math.random() * 1.55,
        spin: (.0018 + Math.random() * .004) * (i % 2 ? 1 : -1),
        width: .7 + Math.random() * 2.4,
        alpha: .16 + Math.random() * .28
      }));
      shellBands = Array.from({ length: 11 }, (_, i) => ({
        r: radius * (.56 + i * .043),
        tilt: .2 + (i % 5) * .13,
        rot: Math.random() * Math.PI,
        spin: (.0008 + Math.random() * .0017) * (i % 2 ? 1 : -1),
        dash: 8 + Math.random() * 24,
        gap: 8 + Math.random() * 18,
        alpha: .1 + Math.random() * .18
      }));
      shardLines = Array.from({ length: Math.floor(92 * density) }, (_, i) => ({
        r1: radius * (.28 + Math.random() * .62),
        r2: radius * (.3 + Math.random() * .72),
        a1: Math.random() * Math.PI * 2,
        a2: Math.random() * Math.PI * 2,
        tilt: .2 + Math.random() * .62,
        rot: Math.random() * Math.PI,
        spin: (.0006 + Math.random() * .002) * (i % 2 ? 1 : -1),
        alpha: .08 + Math.random() * .2
      }));
    }
    function color(name) {
      return getComputedStyle(document.body).getPropertyValue(name).trim();
    }
    function rgbaVar(name, alpha) {
      return `rgba(${getComputedStyle(document.body).getPropertyValue(name).trim()},${alpha})`;
    }
    function drawNetwork() {
      if (!networkCtx) return;
      networkCtx.clearRect(0, 0, innerWidth, innerHeight);
      networkCtx.strokeStyle = rgbaVar("--gold-rgb", .18);
      networkCtx.fillStyle = color("--gold");
      points.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > innerWidth) p.vx *= -1;
        if (p.y < 0 || p.y > innerHeight) p.vy *= -1;
        networkCtx.globalAlpha = .32;
        networkCtx.beginPath();
        networkCtx.arc(p.x, p.y, 1.2, 0, Math.PI * 2);
        networkCtx.fill();
        for (let j = i + 1; j < points.length; j++) {
          const q = points[j];
          const d = Math.hypot(p.x - q.x, p.y - q.y);
          if (d < 120) {
            networkCtx.globalAlpha = (120 - d) / 520;
            networkCtx.beginPath();
            networkCtx.moveTo(p.x, p.y);
            networkCtx.lineTo(q.x, q.y);
            networkCtx.stroke();
          }
        }
      });
      requestAnimationFrame(drawNetwork);
    }
    function drawCore() {
      if (!coreCtx) return;
      coreCtx.clearRect(0, 0, innerWidth, innerHeight);
      coreCtx.globalCompositeOperation = "lighter";
      const cx = innerWidth / 2;
      const cy = innerHeight * .44;
      const base = Math.min(innerWidth, innerHeight);
      const now = Date.now();
      const isSpeaking = document.body.classList.contains("speaking");
      const isLoading = document.body.classList.contains("listening");
      const breath = Math.sin(now * .004);
      const fastBreath = Math.sin(now * .014);
      const pulseScale = isSpeaking ? 1.045 + fastBreath * .035 : isLoading ? 1.025 + fastBreath * .025 : 1 + breath * .01;
      const radius = Math.max(175, Math.min(315, base * .34)) * pulseScale;
      const gold = color("--gold");
      const speedBoost = isSpeaking ? 2.1 : isLoading ? 1.65 : 1;
      const t = now * .001 * speedBoost;
      const cameraBreath = 1 + Math.sin(now * .0016) * .012;

      coreCtx.lineCap = "round";
      coreCtx.save();
      coreCtx.translate(cx, cy);
      coreCtx.scale(cameraBreath, cameraBreath);
      coreCtx.translate(-cx, -cy);

      [
        { x: -.32, y: -.22, r: .8, a: .08 },
        { x: .42, y: -.1, r: .58, a: .055 },
        { x: .18, y: .32, r: .66, a: .045 }
      ].forEach((light, i) => {
        const lx = cx + radius * light.x + Math.sin(t * .35 + i) * radius * .04;
        const ly = cy + radius * light.y + Math.cos(t * .28 + i) * radius * .03;
        const cyanLight = coreCtx.createRadialGradient(lx, ly, 0, lx, ly, radius * light.r);
        cyanLight.addColorStop(0, `rgba(45,230,255,${light.a})`);
        cyanLight.addColorStop(.42, "rgba(45,230,255,.018)");
        cyanLight.addColorStop(1, "rgba(45,230,255,0)");
        coreCtx.globalAlpha = 1;
        coreCtx.fillStyle = cyanLight;
        coreCtx.beginPath();
        coreCtx.arc(lx, ly, radius * light.r, 0, Math.PI * 2);
        coreCtx.fill();
      });

      const aura = coreCtx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.55);
      aura.addColorStop(0, rgbaVar("--gold-rgb", isSpeaking ? .34 : .24));
      aura.addColorStop(.38, rgbaVar("--gold-rgb", .08));
      aura.addColorStop(1, rgbaVar("--gold-rgb", 0));
      coreCtx.fillStyle = aura;
      coreCtx.globalAlpha = 1;
      coreCtx.beginPath();
      coreCtx.arc(cx, cy, radius * 1.6, 0, Math.PI * 2);
      coreCtx.fill();

      const amberBloom = coreCtx.createRadialGradient(cx, cy, radius * .12, cx, cy, radius * .92);
      amberBloom.addColorStop(0, rgbaVar("--amber-rgb", isSpeaking ? .16 : .11));
      amberBloom.addColorStop(.42, rgbaVar("--amber-rgb", .035));
      amberBloom.addColorStop(1, rgbaVar("--amber-rgb", 0));
      coreCtx.fillStyle = amberBloom;
      coreCtx.globalAlpha = 1;
      coreCtx.beginPath();
      coreCtx.arc(cx, cy, radius * .95, 0, Math.PI * 2);
      coreCtx.fill();

      function depthAt(angle) {
        return .5 + .5 * Math.sin(angle);
      }

      function withDepth(alpha, depth) {
        return alpha * (.18 + depth * .82);
      }

      function flicker(seed, amount = .22, rate = 1) {
        return 1 - amount * .5 + amount * (.5 + .5 * Math.sin(t * (2.1 + rate) + seed * 17.13));
      }

      function strokeArc(r, start, len, width, alpha) {
        const depth = depthAt(start + len * .5);
        const edgeFade = r > radius * 1.04 ? .12 : r > radius * .82 ? .28 : 1;
        coreCtx.save();
        coreCtx.filter = depth < .42 ? "blur(1.2px)" : "none";
        coreCtx.globalAlpha = withDepth(alpha * edgeFade, depth) * flicker(start + r * .01, .18);
        coreCtx.lineWidth = width;
        coreCtx.strokeStyle = rgbaVar("--gold-rgb", .9);
        coreCtx.beginPath();
        coreCtx.arc(cx, cy, r, start, start + len);
        coreCtx.stroke();
        coreCtx.restore();
      }

      function noise01(seed) {
        const raw = Math.sin(seed * 91.771 + 12.9898) * 43758.5453;
        return raw - Math.floor(raw);
      }

      function brokenArcBand(r, spin, count, alpha, width, bias = 0) {
        for (let i = 0; i < count; i++) {
          const n = noise01(i * 11.7 + r * .013 + bias);

      for (let i = 0; i < 10; i++) {
        const n = noise01(i * 9.2);
        const a = t * (1.1 + n) + i * Math.PI * .62;
        const rr = triR * (.28 + n * .92);
        coreCtx.globalAlpha = .07 + n * .15;
        coreCtx.lineWidth = .7 + n;
        coreCtx.strokeStyle = i % 3 === 0 ? "rgba(255,255,230,.8)" : rgbaVar("--gold-rgb", .78);
        coreCtx.beginPath();
        coreCtx.moveTo(cx + Math.cos(a) * rr * .28, cy + Math.sin(a) * rr * .28);
        coreCtx.lineTo(cx + Math.cos(a + n * 1.6) * rr, cy + Math.sin(a + n * .9) * rr);
        coreCtx.stroke();
      }

      coreCtx.globalAlpha = .075;
      coreCtx.lineWidth = 1;
      coreCtx.strokeStyle = rgbaVar("--gold-rgb", .72);
      coreCtx.beginPath();
      coreCtx.moveTo(cx - triR * .7, cy + triR * .58);
      coreCtx.lineTo(cx, cy - triR * .52);
      coreCtx.lineTo(cx + triR * .68, cy + triR * .58);
      coreCtx.stroke();

      const waveY = Math.min(innerHeight * .78, cy + radius * 1.42);
      const waveW = Math.min(650, innerWidth * .52);
      const waveAmp = isSpeaking ? 18 : isLoading ? 9 : 3;
      const waveGrad = coreCtx.createLinearGradient(cx - waveW / 2, waveY, cx + waveW / 2, waveY);
      waveGrad.addColorStop(0, rgbaVar("--gold-rgb", 0));
      waveGrad.addColorStop(.5, rgbaVar("--gold-rgb", .88));
      waveGrad.addColorStop(1, rgbaVar("--gold-rgb", 0));
      coreCtx.globalAlpha = isSpeaking ? .88 : .5;
      coreCtx.lineWidth = 2;
      coreCtx.strokeStyle = waveGrad;
      coreCtx.beginPath();
      for (let x = -waveW / 2; x <= waveW / 2; x += 8) {
        const y = waveY + Math.sin(x * .035 + t * 4.2) * waveAmp * Math.sin((x / waveW + .5) * Math.PI);
        if (x === -waveW / 2) coreCtx.moveTo(cx + x, y);
        else coreCtx.lineTo(cx + x, y);
      }
      coreCtx.stroke();

      const fog = coreCtx.createRadialGradient(cx, cy + radius * .12, radius * .45, cx, cy, radius * 1.55);
      fog.addColorStop(0, "rgba(45,230,255,0)");
      fog.addColorStop(.48, "rgba(45,230,255,.018)");
      fog.addColorStop(.78, rgbaVar("--amber-rgb", .026));
      fog.addColorStop(1, "rgba(0,0,0,0)");
      coreCtx.globalCompositeOperation = "lighter";
      coreCtx.globalAlpha = .55 + Math.sin(t * .32) * .12;
      coreCtx.fillStyle = fog;
      coreCtx.beginPath();
      coreCtx.arc(cx, cy, radius * 1.62, 0, Math.PI * 2);
      coreCtx.fill();

      coreCtx.restore();
      coreCtx.globalCompositeOperation = "source-over";
      requestAnimationFrame(drawCore);
    }

    window.addEventListener("resize", resize);
    resize();
    drawNetwork();
    drawCore();
    applyTheme();
    renderMessages();
    tick();
    setMode("online", "Awaiting command.", "ACTIVE");
    setInterval(tick, 1000);
    setTimeout(() => document.getElementById("boot").classList.add("hide"), 1700);
  </script>
</body>
</html>
